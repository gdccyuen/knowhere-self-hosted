services:
  app:
    image: ${KNOWHERE_IMAGE:-knowhere-registry.cn-shenzhen.cr.aliyuncs.com/knowhere/knowhere:sjg-a23167bf-cn}
    restart: unless-stopped
    env_file:
      - path: .env.defaults
        required: true
      - path: .env
        required: true
    ports:
      - "${API_HOST_BIND:-127.0.0.1}:${API_HOST_PORT:-5005}:5005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - knowhere_user_data:/data/users
      - knowhere_model_cache:/data/models
      - knowhere_secrets:/data/secrets

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-Knowhere}
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-root} -d $${POSTGRES_DB:-Knowhere}"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --stop-writes-on-bgsave-error no
    ports:
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  knowhere_user_data:
  knowhere_model_cache:
  knowhere_secrets:
  postgres_data:
  redis_data:
